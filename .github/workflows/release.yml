name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Build ko binaries for both arches and pack a multi-arch OCI bundle.
  # Attach everything to a GitHub Release named after the tag.
  build:
    name: build release artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git describe works

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: show version
        run: |
          VERSION=$(git describe --tags --always --dirty)
          echo "VERSION=$VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: build (linux/amd64)
        run: make build-amd64

      - name: build (linux/arm64)
        run: make build-arm64

      - name: pack multi-arch OCI bundle
        run: |
          mkdir -p dist
          ./bin/ko-linux-amd64 pack build \
            --arch all \
            --output dist \
            --version "$VERSION"

      - name: list artifacts
        run: |
          ls -lh bin/
          ls -lh dist/

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            bin/ko-linux-amd64
            bin/ko-linux-arm64
            dist/ko-multi.oci.tar.gz
            dist/ko-*-amd64.oci.tar.gz
            dist/ko-*-arm64.oci.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}